            --primary: #0284c7; 
            --primary-dark: #0369a1;

            --warning: #f59e0b; 
            --danger: #ef4444;

            --radius: 12px;
            --font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-body);
            color: var(--text-main);
            line-height: 1.5;
            padding-bottom: 2rem;
        }

        /* --- HEADER --- */
        header {
            background-color: var(--bg-card);
            padding: 1rem 1.5rem;
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: var(--danger);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .logo-text h1 {
            font-size: 1.25rem;
            color: var(--text-main);
            line-height: 1.1;
        }

        .logo-text p {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .emergency-badge {
            background: #fee2e2;
            color: #991b1b;
            padding: 0.5rem 1rem;
            border-radius: 99px;
            font-weight: 600;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            animation: pulse-red 2s infinite;
        }

        /* --- MAIN CONTAINER --- */
        main {

            margin: 2rem auto;
            padding: 0 1rem;

        /* --- EMERGENCY INPUT SECTION --- */
        .search-panel {
            background: var(--bg-card);
            padding: 1.5rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow-md);
            margin-bottom: 2rem;
            border-left: 5px solid var(--primary);
        }

        .search-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr auto;
            gap: 1rem;
            align-items: end;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .form-control {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(2, 132, 199, 0.1);
        }

        .btn-search {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            height: 48px;

        .btn-search:hover { background: var(--primary-dark); }

        .map-container {
            width: 100%;
            height: 250px;
            background-color: #e2e8f0;
            background-image: 
                radial-gradient(#cbd5e1 2px, transparent 2px);
            background-size: 20px 20px;
            border-radius: var(--radius);

            margin-bottom: 2rem;
            overflow: hidden;
            border: 2px solid white;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.05);

        .map-marker {
            position: absolute;
            transform: translate(-50%, -100%);

            flex-direction: column;
            align-items: center;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-main);

        .map-icon {

            z-index: 10;

        .hospital-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: var(--bg-card);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);

            transition: transform 0.2s, box-shadow 0.2s;

   const { jsPDF } = window.jspdf;

function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;

    const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(lat1 * Math.PI / 180) *
        Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLon / 2) *
        Math.sin(dLon / 2);

    return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
}
let routingControl = null;

function drawRoute(hospital) {
    if (!userLat || !userLng) return;

    const lat1 = userLat;
    const lng1 = userLng;
    const lat2 = parseFloat(hospital.lat);
    const lng2 = parseFloat(hospital.lng);

    if (routingControl) {
        map.removeControl(routingControl);
    }

    routingControl = L.Routing.control({
    waypoints: [
        L.latLng(lat1, lng1),
        L.latLng(lat2, lng2)
    ],
    routeWhileDragging: false,
    addWaypoints: false,
    draggableWaypoints: false,
    showAlternatives: false,
    containerClassName: 'hidden-routing',
    createMarker: () => null,
    lineOptions: {
        styles: [{ color: 'blue', weight: 5 }]
    }
}).addTo(map);

    routingControl.on('routesfound', function() {
        map.fitBounds(routingControl.getBounds(), { padding: [50, 50] });
    });
}

});
if (filtered.length === 0 && userLat && userLng) {

    filtered.sort((a, b) => {

        const d2 = getDistance(userLat, userLng, parseFloat(b.lat), parseFloat(b.lng));

}
filtered.sort((a, b) => {

    const d2 = getDistance(userLat, userLng, parseFloat(b.lat), parseFloat(b.lng));

});
            filtered.forEach((h, index) => {

    if (userLat && userLng) {

if (selectedType === 'all') selectedType = 'general';
if (selectedType === 'trauma') selectedType = 'surgical';

const currentBeds = h[selectedType];

                if (currentBeds === 0) {

                    statusText = 'Available';
                }

                let predictedChange = 0;
                if (currentBeds === 0) predictedChange = Math.floor(Math.random() * 2); 
                else if (currentBeds > totalBeds * 0.8) predictedChange = -(Math.floor(Math.random() * 3));
                else predictedChange = (Math.random() > 0.5 ? 1 : -1);

                const predicted = currentBeds + predictedChange;
                const trendClass = predictedChange >= 0 ? 'trend-up' : 'trend-down';
                const trendIcon = predictedChange >= 0 ? '↗' : '↘';

                const card = document.createElement('div');
                card.className = 'card' + (index === 0 ? ' nearest-hospital' : '');
                card.innerHTML = `
    <div class="card-header">
        <div>
            ${index === 0 ? '<span style="color:green;font-size:12px;margin-bottom:4px;display:block;">⭐ Nearest</span>' : ''}
            <div class="hospital-name">${h.name}</div>
            <div class="hospital-location">${h.location} • ${distanceText}</div>
        </div>
        <span class="status-badge ${statusClass}">${statusText}</span>
    </div>
                    <div class="card-body">
                        <div class="tags">
                            ${h.specialization.split(',').map(s => `<span class="tag">${s}</span>`).join('')}
                        </div>
                        <div class="stat-row">
                            <span>Beds Available:</span>
                            <strong style="color: ${currentBeds > 0 ? 'var(--text-main)' : 'var(--danger)'}">
                                ${currentBeds} / ${totalBeds}
                            </strong>
                        </div>
                        <div class="prediction">
                            <span>Prediction (30m): ${predicted} beds</span>
                            <span class="${trendClass}">${trendIcon}</span>
                        </div>
                    </div>
                    <div class="card-footer">
                        <button class="btn btn-reserve" ${currentBeds === 0 ? 'disabled' : ''} onclick="openForm(${h.id})">
                            ${currentBeds === 0 ? 'Unavailable' : 'Reserve Bed (10 min Hold)'}
                        </button>
                        <button class="btn btn-ambulance" onclick="requestAmbulance('${h.name}')">
                            Request Ambulance Only
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
            if (filtered.length > 0) {
    drawRoute(filtered[0]);
}
            updateMapMarkers(filtered);
        }
        
        function updateMapMarkers(hospitals) {
    markers.forEach(m => map.removeLayer(m));
    markers = [];

    hospitals.forEach(h => {
        if (!h.lat || !h.lng) return;

        const marker = L.marker([parseFloat(h.lat), parseFloat(h.lng)])
            .addTo(map)
            .bindPopup(`<b>${h.name}</b><br>${h.location}`);

        markers.push(marker);
    });
    if (markers.length > 0) {
    const group = L.featureGroup(markers);
    if (!map._zoomInitialized) {
    map.fitBounds(group.getBounds());
    map._zoomInitialized = true;
}
}
}

        function findBestMatch() {
            const input = document.getElementById('emergency-input').value.toLowerCase();
            const typeSelect = document.getElementById('icu-type');
            let target = typeSelect.value;

            if (input.includes('heart') || input.includes('chest pain') || input.includes('attack')) {
                target = 'Cardiac';
                typeSelect.value = 'Cardiac';
            } else if (input.includes('brain') || input.includes('stroke') || input.includes('head')) {
                target = 'Neuro';
                typeSelect.value = 'Neuro';
            } else if (input.includes('accident') || input.includes('bleed') || input.includes('broken')) {
                target = 'Trauma';
                typeSelect.value = 'Trauma';
            } else if (input.includes('baby') || input.includes('infant')) {
                target = 'Neonatal';
                typeSelect.value = 'Neonatal';
            }

            renderHospitals(target);
            showToast(`Found matches for: ${target === 'All' ? 'All' : target + ' ICU'}`);
        }

       async function reserveBed(id) {
    if (activeBooking) {
        showToast("Finish current booking first.", true);
        return;
    }

    const hospital = hospitals.find(h => h.id === id);
    if (!hospital) return;

   let selectedType = document.getElementById('icu-type').value.toLowerCase();

if (selectedType === 'all') selectedType = 'general';
if (selectedType === 'trauma') selectedType = 'surgical';

const type = selectedType;

await fetch(`http://127.0.0.1:8000/update-bed/${hospital.id}?type=${type}&change=-1`, {
    method: "POST"
});

    await loadHospitals();

    activeBooking = {
        hospitalName: hospital.name,
         type: type,
        ambId: 'AMB-' + Math.floor(Math.random() * 9000 + 1000),
        eta: Math.floor(Math.random() * 10 + 5),
        startTime: Date.now(),
        duration: 10 * 60 * 1000 
    };

    document.getElementById('booking-hospital').innerText = activeBooking.hospitalName;
    document.getElementById('booking-amb-id').innerText = activeBooking.ambId;
    document.getElementById('booking-eta').innerText = activeBooking.eta + " min";
    document.getElementById('booking-panel').classList.add('active');

    updateTimer();
    bookingTimer = setInterval(updateTimer, 1000);
}

        
        function updateTimer() {
            if (!activeBooking) return;

            const now = Date.now();
            const elapsed = now - activeBooking.startTime;
            const remaining = Math.max(0, activeBooking.duration - elapsed);

            // Format mm:ss
            const mins = Math.floor(remaining / 60000);
            const secs = Math.floor((remaining % 60000) / 1000);
            document.getElementById('hold-timer').innerText = 
                `${mins}:${secs < 10 ? '0' : ''}${secs}`;

            // Progress Bar
            const pct = (remaining / activeBooking.duration) * 100;
            document.getElementById('booking-progress').style.width = pct + '%';

            if (remaining <= 0) {
                cancelBooking();
            }
        }

        async function cancelBooking() {
    if (!activeBooking) return;

    const hospital = hospitals.find(h => h.name === activeBooking.hospitalName);

    if (hospital) {
        await fetch(`http://127.0.0.1:8000/update-bed/${hospital.id}?type=${activeBooking.type}&change=1`, {
            method: "POST"
        });
    }

    clearInterval(bookingTimer);
    activeBooking = null;
    document.getElementById('booking-panel').classList.remove('active');

    await loadHospitals();
    showToast("Booking expired or cancelled.");
}

       function requestAmbulance(hospitalName) {
    showToast(`Ambulance dispatched to ${hospitalName}`);
}

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.borderLeftColor = isError ? 'var(--danger)' : 'var(--success)';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
       function logout() {
    localStorage.clear();
    window.location.href = "3.html";
}
