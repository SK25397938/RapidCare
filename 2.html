<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RapidCare Admin Dashboard</title>
    <style>
        :root {
            --primary: #0f172a;
            --accent: #3b82f6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #334155;
            --text-light: #64748b;
            --border: #e2e8f0;
            --radius: 8px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        body { background-color: var(--bg); color: var(--text-main); line-height: 1.5; }

        header {
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand h1 { font-size: 1.25rem; color: var(--primary); font-weight: 700; }
        .brand span { color: var(--accent); font-weight: 400; }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--success);
            background: #ecfdf5;
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--success);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        main { max-width: 1400px; margin: 2rem auto; padding: 0 1.5rem; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .stat-label { font-size: 0.875rem; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-value { font-size: 2rem; font-weight: 700; color: var(--primary); margin-top: 0.5rem; }

        .dashboard-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }

        .hospital-list { display: flex; flex-direction: column; gap: 1.5rem; }

        .hospital-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .hospital-header {
            padding: 1.25rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8fafc;
        }

        .hospital-info h3 { font-size: 1.1rem; color: var(--primary); }
        .hospital-info p { font-size: 0.875rem; color: var(--text-light); }

        .icu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            padding: 1.25rem;
            gap: 1rem;
        }

        .icu-control {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            background: #f1f5f9;
            padding: 0.75rem;
            border-radius: 6px;
        }

        .icu-label { font-size: 0.75rem; font-weight: 600; color: var(--text-light); }
        
        .control-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .btn-circle {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s;
        }
        .btn-circle:hover { opacity: 0.8; }
        .btn-minus { background: #fee2e2; color: var(--danger); }
        .btn-plus { background: #dcfce7; color: var(--success); }

        .bed-count { font-weight: 700; font-size: 1.1rem; width: 30px; text-align: center; }

        .progress-section { padding: 0 1.25rem 1.25rem; }
        .progress-label { display: flex; justify-content: space-between; font-size: 0.875rem; margin-bottom: 0.5rem; }
        .progress-track { height: 8px; background: #e2e8f0; border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; transition: width 0.5s ease, background-color 0.3s; }

        .sidebar { display: flex; flex-direction: column; gap: 2rem; }

        .panel {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .panel h2 { font-size: 1.1rem; margin-bottom: 1.25rem; color: var(--primary); display: flex; align-items: center; gap: 0.5rem; }

        .amb-control-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
            padding: 1rem;
            background: #f8fafc;
            border-radius: 6px;
        }

        .amb-actions { display: flex; gap: 0.5rem; }

        .activity-feed {
            height: 400px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .feed-item {
            font-size: 0.875rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 0.75rem;
            align-items: flex-start;
        }

        .feed-item:last-child { border-bottom: none; }
        
        .feed-icon { 
            width: 8px; 
            height: 8px; 
            border-radius: 50%; 
            margin-top: 6px; 
            flex-shrink: 0;
        }
        .icon-info { background: var(--accent); }
        .icon-success { background: var(--success); }
        .icon-warn { background: var(--warning); }

        .feed-content { flex: 1; }
        .feed-time { font-size: 0.75rem; color: var(--text-light); display: block; margin-top: 2px; }

        @media (max-width: 1024px) {
            .dashboard-layout { grid-template-columns: 1fr; }
            .sidebar { flex-direction: row; flex-wrap: wrap; }
            .panel { flex: 1; min-width: 300px; }
        }

        @media (max-width: 600px) {
            .icu-grid { grid-template-columns: 1fr 1fr; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<header>
    <div id="admin-email" style="font-size:12px; color:gray;">
    Admin:
</div>
    <div class="brand">
        <h1>RapidCare <span>Admin</span></h1>
    </div>
    <div class="status-badge">
        <div class="status-dot"></div>
        Live System
    </div>
    <button onclick="logout()" style="margin-left:20px; padding:6px 12px; cursor:pointer;">
    Logout
</button>
</header>

<main>
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">Total ICU Beds</div>
            <div class="stat-value" id="stat-total-beds">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Available Beds</div>
            <div class="stat-value" id="stat-avail-beds" style="color: var(--success)">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Occupied Beds</div>
            <div class="stat-value" id="stat-occupied-beds" style="color: var(--danger)">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Total Ambulances</div>
            <div class="stat-value" id="stat-total-amb">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Available Ambulances</div>
            <div class="stat-value" id="stat-avail-amb" style="color: var(--accent)">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Active Bookings</div>
            <div class="stat-value" id="stat-bookings" style="color: var(--warning)">0</div>
        </div>
    </div>

    <div class="dashboard-layout">
        <div class="hospital-list" id="hospital-container">
            
        </div>

        <div class="sidebar">
            <div class="panel">
                <h2>🚑 Ambulance Fleet</h2>
                <div id="ambulance-controls"></div>
            </div>

            <div class="panel">
                <h2>📢 Live Activity</h2>
                <div class="activity-feed" id="activity-feed">
                </div>
            </div>
        </div>
    </div>
</main>

<script>
    const role = localStorage.getItem("role");
if (role !== "admin") {
    window.location.href = "3.html";
}
   let hospitals = [];
   const email = localStorage.getItem("email");

if (!email) {
    window.location.href = "3.html";
}

async function loadHospitals() {
    const res = await fetch(`http://127.0.0.1:8000/admin-hospital?email=${email}`);
    const data = await res.json();

    if (!data || data.error) {
        hospitals = [];
    } else {
        hospitals = [data];
    }

    renderHospitals();
    renderAmbulances();
    calculateStats();
}

loadHospitals();
setInterval(loadHospitals, 3000);

    const feedContainer = document.getElementById('activity-feed');

    function logActivity(msg, type = 'info') {
        const div = document.createElement('div');
        div.className = 'feed-item';
        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second:'2-digit' });
        
        let iconClass = 'icon-info';
        if (type === 'success') iconClass = 'icon-success';
        if (type === 'warn') iconClass = 'icon-warn';

        div.innerHTML = `
            <div class="feed-icon ${iconClass}"></div>
            <div class="feed-content">
                <span>${msg}</span>
                <span class="feed-time">${time}</span>
            </div>
        `;
        feedContainer.prepend(div);
        
        if (feedContainer.children.length > 20) {
            feedContainer.removeChild(feedContainer.lastChild);
        }
    }

    function calculateStats() {
        let totalBeds = 0;
        let availBeds = 0;
        let totalAmb = 0;
        let availAmb = 0;
        let occupiedBeds = 0;

        hospitals.forEach(h => {
            const hTotal =[h.cardiac, h.neuro, h.surgical, h.neonatal, h.general].reduce((a, b) => a + b, 0);
            const hOccupied = Math.floor(hTotal * 0.75); 
            const hAvail = hTotal - hOccupied;

            totalBeds += hTotal;
            availBeds += hAvail;
            occupiedBeds += hOccupied;
            totalAmb += h.total_ambulances;
            availAmb += h.available_ambulances;
        });

        document.getElementById('stat-total-beds').innerText = totalBeds;
        document.getElementById('stat-avail-beds').innerText = availBeds;
        document.getElementById('stat-occupied-beds').innerText = occupiedBeds;
        document.getElementById('stat-total-amb').innerText = totalAmb;
        document.getElementById('stat-avail-amb').innerText = availAmb;
        document.getElementById('stat-bookings').innerText = 0;
    }

    function renderHospitals() {
        const container = document.getElementById('hospital-container');
        container.innerHTML = '';

        hospitals.forEach(h => {
            const totalCapacity = h.cardiac + h.neuro + h.surgical + h.neonatal + h.general;
            const currentOccupied = Math.floor(totalCapacity * 0.6); 
            const occupancyRate = Math.round((currentOccupied / totalCapacity) * 100);
            
            let barColor = 'var(--success)';
            if (occupancyRate > 50) barColor = 'var(--warning)';
            if (occupancyRate > 80) barColor = 'var(--danger)';

            const card = document.createElement('div');
            card.className = 'hospital-card';

            let icuRows = '';
          const icuTypes = {
    cardiac: h.cardiac,
    neuro: h.neuro,
    surgical: h.surgical,
    neonatal: h.neonatal,
    general: h.general
};

for (const [type, count] of Object.entries(icuTypes))   {
                icuRows += `
                    <div class="icu-control">
                        <div class="icu-label">${type} ICU</div>
                        <div class="control-row">
                            <button class="btn-circle btn-minus" onclick="updateBed(${h.id}, '${type}', -1)">-</button>
                            <span class="bed-count">${count}</span>
                            <button class="btn-circle btn-plus" onclick="updateBed(${h.id}, '${type}', 1)">+</button>
                        </div>
                    </div>
                `;
            }

            card.innerHTML = `
                <div class="hospital-header">
                    <div class="hospital-info">
                        <h3>${h.name}</h3>
                        <p>${h.location}</p>
                    </div>
                </div>
                <div class="icu-grid">
                    ${icuRows}
                </div>
                <div class="progress-section">
                    <div class="progress-label">
                        <span>Current Occupancy Load</span>
                        <span>${occupancyRate}%</span>
                    </div>
                    <div class="progress-track">
                        <div class="progress-fill" style="width: ${occupancyRate}%; background-color: ${barColor}"></div>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function renderAmbulances() {
        const container = document.getElementById('ambulance-controls');
        container.innerHTML = '';

        hospitals.forEach(h => {
            const div = document.createElement('div');
            div.className = 'amb-control-group';
            div.innerHTML = `
                <div>
                    <div style="font-weight: 600; font-size: 0.9rem;">${h.name}</div>
                    <div style="font-size: 0.75rem; color: var(--text-light);">Available: ${h.available_ambulances} / ${h.total_ambulances}</div>
                </div>
                <div class="amb-actions">
                    <button class="btn-circle btn-minus" onclick="updateAmbulance(${h.id}, -1)">-</button>
                    <button class="btn-circle btn-plus" onclick="updateAmbulance(${h.id}, 1)">+</button>
                </div>
            `;
            container.appendChild(div);
        });
    }

    async function updateBed(hid, type, delta) {
    await fetch(`http://127.0.0.1:8000/update-bed/${hid}?type=${type.toLowerCase()}&change=${delta}`, {
        method: "POST"
    });

    loadHospitals();
}

    async function updateAmbulance(hid, delta) {
    await fetch(`http://127.0.0.1:8000/update-ambulance/${hid}?change=${delta}`, {
        method: "POST"
    });

    loadHospitals();
}

    document.addEventListener('DOMContentLoaded', () => {
    document.getElementById("admin-email").innerText = email;

    renderHospitals();
    renderAmbulances();
    calculateStats();
    logActivity('System Dashboard Initialized', 'info');
});
    function logout() {
    localStorage.removeItem("role");
    localStorage.removeItem("email");
    window.location.href = "3.html";
}
</script>
</body>
</html>
