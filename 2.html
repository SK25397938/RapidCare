<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RapidCare Admin Dashboard</title>
    <style>
        :root {
            --primary: #0f172a;
            --accent: #3b82f6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #334155;
            --text-light: #64748b;
            --border: #e2e8f0;
            --radius: 8px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        body { background-color: var(--bg); color: var(--text-main); line-height: 1.5; }

        header {
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand h1 { font-size: 1.25rem; color: var(--primary); font-weight: 700; }
        .brand span { color: var(--accent); font-weight: 400; }

        .header-controls { display: flex; align-items: center; gap: 1rem; }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--success);
            background: #ecfdf5;
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--success);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .btn-logout {
            padding: 0.5rem 1rem;
            border: 1px solid var(--border);
            background: white;
            color: var(--text-main);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s;
        }
        .btn-logout:hover { background: #f8fafc; border-color: #cbd5e1; }

        main { max-width: 1400px; margin: 2rem auto; padding: 0 1.5rem; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .stat-label { font-size: 0.875rem; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-value { font-size: 2rem; font-weight: 700; color: var(--primary); margin-top: 0.5rem; }

        .dashboard-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }

        .hospital-list { display: flex; flex-direction: column; gap: 1.5rem; }

        .hospital-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .hospital-header {
            padding: 1.25rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8fafc;
        }

        .hospital-info h3 { font-size: 1.1rem; color: var(--primary); }
        .hospital-info p { font-size: 0.875rem; color: var(--text-light); }

        .icu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            padding: 1.25rem;
            gap: 1rem;
        }

        .icu-control {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            background: #f1f5f9;
            padding: 0.75rem;
            border-radius: 6px;
        }

        .icu-label { font-size: 0.75rem; font-weight: 600; color: var(--text-light); }
        
        .control-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .btn-circle {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s, transform 0.1s;
        }
        .btn-circle:active { transform: scale(0.95); }
        .btn-circle:hover { opacity: 0.8; }
        .btn-minus { background: #fee2e2; color: var(--danger); }
        .btn-plus { background: #dcfce7; color: var(--success); }

        .bed-count { font-weight: 700; font-size: 1.1rem; width: 30px; text-align: center; }

        .progress-section { padding: 0 1.25rem 1.25rem; }
        .progress-label { display: flex; justify-content: space-between; font-size: 0.875rem; margin-bottom: 0.5rem; }
        .progress-track { height: 8px; background: #e2e8f0; border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; transition: width 0.5s ease, background-color 0.3s; }

        .sidebar { display: flex; flex-direction: column; gap: 2rem; }

        .panel {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .panel h2 { font-size: 1.1rem; margin-bottom: 1.25rem; color: var(--primary); display: flex; align-items: center; gap: 0.5rem; }

        .amb-control-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
            padding: 1rem;
            background: #f8fafc;
            border-radius: 6px;
        }

        .amb-actions { display: flex; gap: 0.5rem; }

        .activity-feed {
            height: 400px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .feed-item {
            font-size: 0.875rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 0.75rem;
            align-items: flex-start;
        }

        .feed-item:last-child { border-bottom: none; }
        
        .feed-icon { 
            width: 8px; 
            height: 8px; 
            border-radius: 50%; 
            margin-top: 6px; 
            flex-shrink: 0;
        }
        .icon-info { background: var(--accent); }
        .icon-success { background: var(--success); }
        .icon-warn { background: var(--warning); }

        .feed-content { flex: 1; }
        .feed-time { font-size: 0.75rem; color: var(--text-light); display: block; margin-top: 2px; }

        .patient-table-wrapper {
            width: 100%;
            overflow-x: auto;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            background: var(--card-bg);
        }

        .patient-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }

        .patient-table th {
            text-align: left;
            padding: 1rem 1.5rem;
            background-color: #f8fafc;
            color: var(--text-light);
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--border);
        }

        .patient-table td {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            color: var(--text-main);
            font-size: 0.9rem;
        }

        .patient-table tr:last-child td {
            border-bottom: none;
        }

        .patient-table tr:hover td {
            background-color: #f8fafc;
        }

        .btn-discharge {
            padding: 6px 12px;
            background-color: #fee2e2;
            color: var(--danger);
            border: none;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-discharge:hover {
            background-color: #fecaca;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            backdrop-filter: blur(2px);
        }

        .modal-content {
            background: white;
            padding: 2rem;
            width: 100%;
            max-width: 400px;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            cursor: pointer;
            font-size: 20px;
            color: var(--text-light);
            transition: color 0.2s;
        }
        .modal-close:hover { color: var(--danger); }

        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: 0.85rem; color: var(--text-light); margin-bottom: 0.4rem; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 0.6rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.95rem;
            outline: none;
        }
        .form-group input:focus, .form-group select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1);
        }

        .btn-submit {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-submit:hover { background-color: #2563eb; }

        @media (max-width: 1024px) {
            .dashboard-layout { grid-template-columns: 1fr; }
            .sidebar { flex-direction: row; flex-wrap: wrap; }
            .panel { flex: 1; min-width: 300px; }
        }

        @media (max-width: 600px) {
            .icu-grid { grid-template-columns: 1fr 1fr; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<header>
    <div id="admin-email" style="font-size: 0.875rem; color: var(--text-light); font-weight: 500;">
        Admin: <span id="email-display"></span>
    </div>
    <div class="brand">
        <h1>RapidCare <span>Admin</span></h1>
    </div>
    <div class="header-controls">
        <div class="status-badge">
            <div class="status-dot"></div>
            Live System
        </div>
        <button onclick="logout()" class="btn-logout">Logout</button>
    </div>
</header>

<main>
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">Total ICU Beds</div>
            <div class="stat-value" id="stat-total-beds">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Available Beds</div>
            <div class="stat-value" id="stat-avail-beds" style="color: var(--success)">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Occupied Beds</div>
            <div class="stat-value" id="stat-occupied-beds" style="color: var(--danger)">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Total Ambulances</div>
            <div class="stat-value" id="stat-total-amb">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Available Ambulances</div>
            <div class="stat-value" id="stat-avail-amb" style="color: var(--accent)">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Active Bookings</div>
            <div class="stat-value" id="stat-bookings" style="color: var(--warning)">0</div>
        </div>
    </div>

    <div class="dashboard-layout">

        <div class="hospital-list">
            <div id="hospital-container"></div>

            <h3 style="margin-top: 1.5rem; color: var(--primary);">Active Patients</h3>
            
            <div class="patient-table-wrapper" style="margin-top: 1rem;">
                <table id="patient-table" class="patient-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Age</th>
                            <th>Phone Number</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="sidebar">
            <div class="panel">
                <h2>🚑 Ambulance Fleet</h2>
                <div id="ambulance-controls"></div>
            </div>

            <div class="panel">
                <h2>📢 Live Activity</h2>
                <div class="activity-feed" id="activity-feed">
                </div>
            </div>
        </div>
    </div>
</main>

<div id="patient-modal" class="modal">
    <div class="modal-content" style="position:relative;">
        <span class="modal-close" onclick="closeModal()">✖</span>
        <h3 style="margin-bottom: 1.5rem; color: var(--primary);">Add Patient Details</h3>
        
        <div class="form-group">
            <input id="p-name" placeholder="Patient Name">
        </div>
        <div class="form-group">
            <input id="p-age" placeholder="Age" type="number">
        </div>
        <div class="form-group">
            <select id="p-gender">
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>
        </div>
        <div class="form-group">
            <input id="p-phone" placeholder="Phone Number">
        </div>

        <button onclick="submitForm()" class="btn-submit">Submit Patient</button>
    </div>
</div>

<script>
    const role = localStorage.getItem("role");
    if (role !== "admin") {
        window.location.href = "3.html";
    }

    const email = localStorage.getItem("email");
    if (!email) {
        window.location.href = "3.html";
    } else {
        document.getElementById("email-display").innerText = email;
    }

    let hospitals = [];

    async function discharge(id) {
        if(!confirm("Are you sure you want to discharge this patient?")) return;

        await fetch(`https://rapidcare-production.up.railway.app/patient/${id}`, {
            method: "DELETE"
        });

        logActivity(`Patient ID ${id} discharged`, 'success');
        loadPatients();
        loadHospitals();
    }

    async function loadHospitals() {
        try {
            const res = await fetch(`https://rapidcare-production.up.railway.app/admin-hospital?email=${email}`);
            const data = await res.json();

            if (!data || data.error) {
                hospitals = [];
            } else {
                hospitals = [data];
            }
            renderHospitals();
            renderAmbulances();
            calculateStats();
        } catch (e) {
            console.error("Error loading hospitals:", e);
        }
    }

    async function loadPatients() {
        try {
            const res = await fetch(`https://rapidcare-production.up.railway.app/patients?email=${email}`);
            const data = await res.json();

            const tbody = document.querySelector("#patient-table tbody");
            tbody.innerHTML = "";

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; padding: 2rem; color: var(--text-light);">No active patients found.</td></tr>`;
                return;
            }

            data.forEach(p => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td style="font-weight:500;">${p.name}</td>
                    <td>${p.age}</td>
                    <td style="font-family:monospace; color: var(--text-light);">${p.phone}</td>
                    <td>
                        <button class="btn-discharge" onclick="discharge(${p.id})">Discharge</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        } catch (e) {
            console.error("Error loading patients:", e);
        }
    }

    loadHospitals();
    setInterval(loadHospitals, 3000);
    loadPatients();
    setInterval(loadPatients, 3000);

    const feedContainer = document.getElementById('activity-feed');

    function logActivity(msg, type = 'info') {
        const div = document.createElement('div');
        div.className = 'feed-item';
        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second:'2-digit' });
        
        let iconClass = 'icon-info';
        if (type === 'success') iconClass = 'icon-success';
        if (type === 'warn') iconClass = 'icon-warn';

        div.innerHTML = `
            <div class="feed-icon ${iconClass}"></div>
            <div class="feed-content">
                <span>${msg}</span>
                <span class="feed-time">${time}</span>
            </div>
        `;
        feedContainer.prepend(div);
        
        if (feedContainer.children.length > 20) {
            feedContainer.removeChild(feedContainer.lastChild);
        }
    }

    function calculateStats() {
        let totalBeds = 0;
        let availBeds = 0;
        let totalAmb = 0;
        let availAmb = 0;
        let occupiedBeds = 0;

        hospitals.forEach(h => {
            const hTotal = [h.cardiac, h.neuro, h.surgical, h.neonatal, h.general].reduce((a, b) => a + b, 0);
            const hOccupied = Math.floor(hTotal * 0.75);
            const hAvail = hTotal - hOccupied;

            totalBeds += hTotal;
            availBeds += hAvail;
            occupiedBeds += hOccupied;
            totalAmb += h.total_ambulances;
            availAmb += h.available_ambulances;
        });

        document.getElementById('stat-total-beds').innerText = totalBeds;
        document.getElementById('stat-avail-beds').innerText = availBeds;
        document.getElementById('stat-occupied-beds').innerText = occupiedBeds;
        document.getElementById('stat-total-amb').innerText = totalAmb;
        document.getElementById('stat-avail-amb').innerText = availAmb;
        document.getElementById('stat-bookings').innerText = 0;
    }

    function renderHospitals() {
        const container = document.getElementById('hospital-container');
        container.innerHTML = '';

        hospitals.forEach(h => {
            const totalCapacity = h.cardiac + h.neuro + h.surgical + h.neonatal + h.general;
            const currentOccupied = Math.floor(totalCapacity * 0.6); 
            const occupancyRate = totalCapacity > 0 ? Math.round((currentOccupied / totalCapacity) * 100) : 0;
            
            let barColor = 'var(--success)';
            if (occupancyRate > 50) barColor = 'var(--warning)';
            if (occupancyRate > 80) barColor = 'var(--danger)';

            const card = document.createElement('div');
            card.className = 'hospital-card';

            const icuTypes = {
                cardiac: h.cardiac,
                neuro: h.neuro,
                surgical: h.surgical,
                neonatal: h.neonatal,
                general: h.general
            };

            let icuRows = '';
            for (const [type, count] of Object.entries(icuTypes)) {
                icuRows += `
                    <div class="icu-control">
                        <div class="icu-label">${type.charAt(0).toUpperCase() + type.slice(1)} ICU</div>
                        <div class="control-row">
                            <button class="btn-circle btn-minus" onclick="updateBed(${h.id}, '${type}', -1)">-</button>
                            <span class="bed-count">${count}</span>
                            <button class="btn-circle btn-plus" onclick="updateBed(${h.id}, '${type}', 1)">+</button>
                        </div>
                    </div>
                `;
            }

            card.innerHTML = `
                <div class="hospital-header">
                    <div class="hospital-info">
                        <h3>${h.name}</h3>
                        <p>${h.location}</p>
                    </div>
                </div>
                <div class="icu-grid">
                    ${icuRows}
                </div>
                <div class="progress-section">
                    <div class="progress-label">
                        <span>Current Occupancy Load</span>
                        <span>${occupancyRate}%</span>
                    </div>
                    <div class="progress-track">
                        <div class="progress-fill" style="width: ${occupancyRate}%; background-color: ${barColor}"></div>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function renderAmbulances() {
        const container = document.getElementById('ambulance-controls');
        container.innerHTML = '';

        hospitals.forEach(h => {
            const div = document.createElement('div');
            div.className = 'amb-control-group';
            div.innerHTML = `
                <div>
                    <div style="font-weight: 600; font-size: 0.9rem;">${h.name}</div>
                    <div style="font-size: 0.75rem; color: var(--text-light);">Available: ${h.available_ambulances} / ${h.total_ambulances}</div>
                </div>
                <div class="amb-actions">
                    <button class="btn-circle btn-minus" onclick="updateAmbulance(${h.id}, -1)">-</button>
                    <button class="btn-circle btn-plus" onclick="updateAmbulance(${h.id}, 1)">+</button>
                </div>
            `;
            container.appendChild(div);
        });
    }

    async function updateBed(hid, type, delta) {
        try {
            await fetch(`https://rapidcare-production.up.railway.app/update-bed/${hid}?type=${type.toLowerCase()}&change=${delta}`, {
                method: "POST"
            });
            loadHospitals();
        } catch(e) {
            console.error("Update failed", e);
        }
    }

    async function updateAmbulance(hid, delta) {
        try {
            await fetch(`https://rapidcare-production.up.railway.app/update-ambulance/${hid}?change=${delta}`, {
                method: "POST"
            });
            loadHospitals();
        } catch(e) {
            console.error("Update failed", e);
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        renderHospitals();
        renderAmbulances();
        calculateStats();
        logActivity('System Dashboard Initialized', 'info');
    });

    function logout() {
        localStorage.removeItem("role");
        localStorage.removeItem("email");
        window.location.href = "3.html";
    }

    let selectedHospitalId = null;

    function openForm(id) {
        selectedHospitalId = id;
        document.getElementById("patient-modal").style.display = "flex";
    }

    function closeModal() {
        document.getElementById("patient-modal").style.display = "none";
    }

    async function submitForm() {
    const name = document.getElementById("p-name").value;
    const age = document.getElementById("p-age").value;
    const phone = document.getElementById("p-phone").value;
    const gender = document.getElementById("p-gender").value;

    if(!name || !age || !phone) {
        alert("Please fill all fields");
        return;
    }

    await fetch("https://rapidcare-production.up.railway.app/add-patient", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            hospital_id: hospitals.length ? hospitals[0].id : 1,
            name: name,
            age: age,
            gender: gender,
            phone: phone,
            email: localStorage.getItem("email")
        })
    });
    

    logActivity(`New patient ${name} added`, 'success');

    closeModal();

    document.getElementById("p-name").value = "";
    document.getElementById("p-age").value = "";
    document.getElementById("p-phone").value = "";

    loadPatients();
}

    window.onclick = function(event) {
        const modal = document.getElementById('patient-modal');
        if (event.target == modal) {
            closeModal();
        }
    }
</script>

</body>
</html>
